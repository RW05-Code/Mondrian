<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body{
            background-color:rgb(226, 226, 226);
        }
        .container{
            margin:none;
            background-color:black;
            display:inline-grid;
            grid-template-columns:300px 250px 200px 400px;
            grid-gap:10px;
            border:10px solid black;
            min-height:1000px;
            box-shadow:3px 3px 10px gray;
        }
        .item{
            background-color:white;
        }
        #num1{
            grid-row-start:1;
            grid-row-end:3;
            grid-column-start:1;
            grid-column-end:2;
            background-color:yellow;
        }
        #num2{
            grid-column-start:2;
            grid-column-end:3;
            background-color:blue;
        }
        #num3{
            grid-column-start:2;
            grid-column-end:3;
            grid-row-start:3;
            grid-row-end:4;
            background-color:red;
        }        
        #num5{
            grid-row-start:1;
            grid-row-end:3;
            grid-column-start:4;
            grid-column-end:5;
            background-color:red;
        }
        #num6{
            grid-row-start:2;
            grid-row-end:3;
            grid-column-start:2;
            grid-column-end:4;
            background-color:white;
        }
        #num8{
            grid-row-start:3;
            grid-row-end:4;
            grid-column-start:2;
            grid-column-end:3;
            background-color:blue;
        }
        #num10{
            grid-row-start:auto;
            grid-row-end:auto;
            grid-column-start:auto;
            grid-column-start:auto;
            background-color:white;
        }
        #num12{
            grid-row-start:3;
            grid-row-start:4;
            grid-column-start:1;
            grid-column-end:2;
            background-color:red;
        }
        #num13{
            background-color:black;
        }
        #num14{
            grid-column-start:4;
            grid-column-end:5;
        }
        .link:hover{
            color:black;
        }
        .link{
            text-decoration:none;
            color:rgb(117, 117, 117);
            padding:20px; margin:20px;
            font-size:1.75em;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mondrian Grid</title>
</head>
<body>
    <a class="link" href="index.html">Page 1</a>
    <a class="link" href="page2.html">Page 2</a>
    <div class="container">
        <div id="num1" class="item"></div>
        <div id="num2" class="item"></div>
        <div id="num3" class="item"></div>
        <div id="num4" class="item"></div>
        <div id="num5" class="item"></div>
        <div id="num6" class="item"></div>
        <div id="num7" class="item"></div>
        <div id="num8" class="item"></div>
        <div id="num9" class="item"></div>
        <div id="num10" class="item"></div>
        <div id="num11" class="item"></div>
        <div id="num12" class="item"></div>
        <div id="num13" class="item"></div>
        <div id="num14" class="item"></div>
    </div>
</body>
</html>
