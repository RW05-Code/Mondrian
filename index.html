<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container{
            margin:none;
            background-color:black;
            display:grid;
            grid-template-columns:300px 250px auto 400px;
            grid-gap:10px;
            height:1000px;
        }
        .item{
            background-color:white;
        }
        #num1{
            grid-row-start:1;
            grid-row-end:3;
            grid-column-start:1;
            grid-column-end:2;
            background-color:yellow;
        }
        #num2{
            grid-column-start:2;
            grid-column-end:3;
            background-color:blue;
        }
        #num5{
            grid-row-start:2;
            grid-row-end:3;
            grid-column-start:3;
            grid-column-end:5;
            background-color:red;
        }
        #num8{
            grid-row-start:3;
            grid-row-end:4;
            grid-column-start:2;
            grid-column-end:3;
            background-color:blue;
        }
        #num12{
            grid-column-start:4;
            grid-column-end:5;
            background-color:red;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mondrian Grid</title>
</head>
<button style="padding:10px; margin:10px;"><a href="page2.html" style="text-decoration:none; color:black;">Page 2</a></button>
<body>
    <div class="container">
        <div id="num1" class="item"></div>
        <div id="num2" class="item"></div>
        <div id="num3" class="item"></div>
        <div id="num4" class="item"></div>
        <div id="num5" class="item"></div>
        <div id="num6" class="item"></div>
        <div id="num7" class="item"></div>
        <div id="num8" class="item"></div>
        <div id="num9" class="item"></div>
        <div id="num10" class="item"></div>
        <div id="num11" class="item"></div>
        <div id="num12" class="item"></div>
    </div>
    <script src="index.js"></script>
</body>
</html>
