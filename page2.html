<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container{
            margin:none;
            background-color:black;
            display:grid;
            grid-template-columns:4fr 3fr 1.5fr 2.75fr;
            grid-gap:10px;
            height:1000px;
        }
        .item{
            background-color:white;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Mondrian Grid</title>
</head>
<body>
    <button style="padding:10px; margin:10px;"><a href="index.html" style="text-decoration:none; color:black;">Page 1</a></button>
    <div class="container">
        <div id="num1" class="item"></div>
        <div id="num2" class="item"></div>
        <div id="num3" class="item"></div>
        <div id="num4" class="item"></div>
        <div id="num5" class="item"></div>
        <div id="num6" class="item"></div>
        <div id="num7" class="item"></div>
        <div id="num8" class="item"></div>
        <div id="num9" class="item"></div>
        <div id="num10" class="item"></div>
        <div id="num11" class="item"></div>
        <div id="num12" class="item"></div>
    </div>
    <script src="index.js"></script>
</body>
</html>
